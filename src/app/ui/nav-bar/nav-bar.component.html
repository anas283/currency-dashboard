<header class="nav-bar">
  <div class="nav-bar__brand">
    <span class="nav-bar__logo-mark" aria-hidden="true">$</span>
    CurrencyDashboard
  </div>

  <nav class="nav-bar__nav" aria-label="Main">
    @for (link of links(); track link.path) {
      <a
        class="nav-bar__link"
        [routerLink]="link.path"
        routerLinkActive="nav-bar__link--active"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
      >
        {{ link.label }}
      </a>
    }
  </nav>

  <div class="nav-bar__status">
    <app-offline-indicator />
    @if (lastUpdatedLabel(); as label) {
      <span class="nav-bar__updated">{{ label }}</span>
    }
  </div>

  <button
    class="nav-bar__toggle"
    type="button"
    (click)="themeService.toggle()"
    [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    [attr.title]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
  >
    @if (themeService.theme() === 'dark') {
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
      </svg>
    }
  </button>
</header>
